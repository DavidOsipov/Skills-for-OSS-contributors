license_presets:
  CC-BY-4.0:
    name: "Creative Commons Attribution 4.0 International"
    url: "https://creativecommons.org/licenses/by/4.0/"
    deed: "https://creativecommons.org/licenses/by/4.0/deed.en"
    rights_line: "© {year} {creator}. Licensed under CC BY 4.0"
    instructions: "This work is licensed under the Creative Commons Attribution 4.0 International License."
  CC-BY-SA-4.0:
    name: "Creative Commons Attribution-ShareAlike 4.0 International"
    url: "https://creativecommons.org/licenses/by-sa/4.0/"
    deed: "https://creativecommons.org/licenses/by-sa/4.0/deed.en"
    rights_line: "© {year} {creator}. Licensed under CC BY-SA 4.0"
    instructions: "This work is licensed under the Creative Commons Attribution-ShareAlike 4.0 International License."
  CC-BY-NC-SA-4.0:
    name: "Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International"
    url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    deed: "https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en"
    rights_line: "© {year} {creator}. Licensed under CC BY-NC-SA 4.0"
    instructions: "This work is licensed under the Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International License."
  CC0-1.0:
    name: "Creative Commons Zero 1.0 Universal"
    url: "https://creativecommons.org/publicdomain/zero/1.0/"
    deed: "https://creativecommons.org/publicdomain/zero/1.0/deed.en"
    rights_line: "{creator}, {year}. Dedicated to the public domain via CC0 1.0"
    instructions: "This work has been dedicated to the public domain under CC0 1.0."
  All-Rights-Reserved:
    name: "All Rights Reserved"
    url: ""
    deed: ""
    rights_line: "© {year} {creator}. All rights reserved."
    instructions: "All rights reserved. No use without prior written permission from the copyright holder."
