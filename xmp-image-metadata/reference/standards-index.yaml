  - id: xmp-part-2-2022
    title: "Adobe XMP Specification Part 2: Additional Properties"
    version: "2022-02"
    authority: Adobe
    normative: false
    source_url: "https://github.com/adobe/XMP-Toolkit-SDK/blob/main/docs/XMPSpecificationPart2.pdf"
