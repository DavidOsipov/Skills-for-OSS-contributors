schema_version: 1
last_reviewed: "2026-07-22"

# This registry is deliberately metadata-only for restricted standards. The
# public skill does not redistribute ISO or CIPA PDFs. Use ExifTool for file
# operations and consult a local, licensed normative copy only when a semantic
# or representation question cannot be resolved from the bundled IPTC sources.
policy:
  implementation_authority: "ExifTool CLI and its installed version"
  semantic_authority: "The applicable normative standard listed below"
  public_restricted_documents: "URL-only; acquire locally and review terms"
  public_bundle_excludes:
    - "ISO standards and ISO-derived PDFs"
    - "CIPA DC-008-2026 and DC-010-2026 PDFs"

standards:
  - id: iptc-photo-metadata-2025.1
    title: "IPTC Photo Metadata Standard"
    version: "2025.1 revision 1"
    publication_date: "2025-11-26"
    authority: IPTC
    normative: true
    source_url: "https://www.iptc.org/std/photometadata/specification/IPTC-PhotoMetadata-2025.1.html"
    license: "CC BY 4.0"
    redistribution: "bundled-with-attribution"
    bundled_files:
      - reference/iptc/standard-2025.1.html
      - reference/iptc/techreference-2025.1.json
      - reference/iptc/techreference-2025.1.yaml
    applies_to: [IPTC Core, IPTC Extension, AI disclosure, PLUS-linked fields]

  - id: iptc-mapping-guidelines-2023.1
    title: "IPTC Photo Metadata Mapping Guidelines"
    version: "2023.1"
    publication_date: "2023-10-30"
    authority: IPTC
    normative: false
    source_url: "https://iptc.org/std/photometadata/documentation/mappingguidelines/"
    license: "CC BY 4.0"
    redistribution: "bundled-with-attribution"
    bundled_files:
      - reference/iptc/mapping-guidelines-2023.1.html
    applies_to: [XMP, IPTC-IIM, Exif, Schema.org reconciliation]

  - id: iptc-iim-4.2
    title: "IPTC-NAA Information Interchange Model"
    version: "4.2"
    authority: IPTC
    normative: true
    source_url: "https://www.iptc.org/std/IIM/4.2/specification/IIMV4.2.pdf"
    redistribution: "review-before-bundling"
    bundled: false
    local_copy: optional
    applies_to: [legacy IPTC-IIM synchronization]

  - id: xmp-part-1-iso-16684-1-2019
    title: "XMP Part 1: Data model, serialization and core properties"
    version: "2019"
    authority: ISO
    normative: true
    source_url: "https://www.iso.org/standard/75163.html"
    redistribution: restricted
    bundled: false
    local_copy: optional
    applies_to: [RDF model, arrays, language alternatives, packet serialization]

  - id: xmp-part-1-adobe-2012
    title: "Adobe XMP Specification Part 1"
    version: "2012"
    authority: Adobe
    normative: false
    source_url: "https://github.com/adobe/XMP-Toolkit-SDK/blob/main/docs/XMPSpecificationPart1.pdf"
    redistribution: "follow-source-terms"
    bundled: false
